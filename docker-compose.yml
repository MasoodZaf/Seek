version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:6.0
    container_name: seek-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017" # Exposed to host for backup/tools if needed
    networks:
      - seek-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seek-backend
    restart: always
    ports:
      - "5001:5002"
    env_file:
      - ./backend/.env
    environment:
      # Override the local connection string to use Docker networking
      - MONGODB_URI=mongodb://mongo:27017/seek
    volumes:
      # CRITICAL: Allows the backend to spawn child containers for the Code Playground
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist SQLite database across rebuilds so users/data are never lost
      - ./backend/database.sqlite:/app/database.sqlite
    depends_on:
      - mongo
    networks:
      - seek-network

  # Code Execution Sandbox (Piston — self-hosted, no rate limits)
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: seek-piston
    restart: always
    privileged: true
    expose:
      - "2000"
    networks:
      - seek-network
    tmpfs:
      - /piston/jobs
    volumes:
      - piston_packages:/piston/packages
    environment:
      - PISTON_RUN_TIMEOUT=15000
      - PISTON_RUN_CPU_TIME=15000
      - PISTON_COMPILE_TIMEOUT=30000
      - PISTON_COMPILE_CPU_TIME=30000
      - PISTON_MAX_PROCESS_COUNT=256
      - PISTON_MAX_OPEN_FILES=2048
      - PISTON_MAX_FILE_SIZE=10000000

  # Frontend Static Site (Served via internal Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seek-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - seek-network

volumes:
  mongo_data:
  piston_packages:


networks:
  seek-network:
    driver: bridge
